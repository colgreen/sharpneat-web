    .cart-body { fill:#7893a8;stroke:#263746;stroke-width:0.26499999 }
    .wheel { fill:#667783;stroke:#263746;stroke-width:0.6 }
    .wheel-hub { fill:#d8e0e5;stroke:#263746;stroke-width:0.36 }
    .applied-force { fill:none;fill-rule:evenodd;stroke:#2563a6;stroke-width:0.46500003;marker-end:url(#markerAppliedForce) }
    .gravity-force { fill:none;fill-rule:evenodd;stroke:#b2473e;stroke-width:0.465;marker-end:url(#markerGravity) }
    .pole { fill:none;stroke:#263746;stroke-width:1.111111;stroke-linecap:round }
    .pole-point { fill:#000000;stroke:#000000;stroke-width:0.444444 }
    .angle { fill:none;stroke:#000000;stroke-width:0.333333;marker-end:url(#angleArrow) }
