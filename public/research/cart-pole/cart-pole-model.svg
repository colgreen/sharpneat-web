    .angle-symbol { font-size:5.333333px }
    .frame-symbol { font-style:italic;font-weight:normal;font-size:4.6px;font-family:serif;fill:#4f4f4f }
    .point-label { font-style:normal;font-weight:normal;font-size:5.333333px;font-family:serif;fill:#000000 }
