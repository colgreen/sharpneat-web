  <title id="figure1-title">Cart-pole centre-of-mass schematic</title>
  <desc id="figure1-description">A cart on a horizontal track with a pendulum or pole pivoted at P. Point G is the centre of mass at distance r from P. The angle theta is measured clockwise from the upright vertical. Applied force f points right, weight mg points downward, and the fixed XY and rotating RT coordinate frames are shown. Line PG does not necessarily represent the full physical pole length.</desc>
